[build]
builder = "NIXPACKS"
buildCommand = "echo Building NYAI Backend..."

[deploy]
startCommand = "bash -c 'PORT=${PORT:-8080}; echo \"Using port: $PORT\"; exec gunicorn --bind $HOST:$PORT --workers 1 --threads 8 \"src.app:app\"'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env]
NYAI_ENV = "production"
LOG_TO_CONSOLE = "true"
STATELESS_MODE = "true" 