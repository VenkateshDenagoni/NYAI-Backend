name: Secret Scanning

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  detect-secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit .secrets.baseline --report --fail-on-unaudited
        continue-on-error: false

      - name: Check for new secrets
        run: |
          detect-secrets scan > /tmp/new-baseline.json
          python3 - <<'EOF'
          import json, sys

          with open(".secrets.baseline") as f:
              baseline = json.load(f)
          with open("/tmp/new-baseline.json") as f:
              current = json.load(f)

          baseline_results = baseline.get("results", {})
          current_results = current.get("results", {})

          new_secrets = {}
          for filepath, secrets in current_results.items():
              known = {s["hashed_secret"] for s in baseline_results.get(filepath, [])}
              new_in_file = [s for s in secrets if s["hashed_secret"] not in known]
              if new_in_file:
                  new_secrets[filepath] = new_in_file

          if new_secrets:
              print("❌ NEW POTENTIAL SECRETS DETECTED:")
              for filepath, secrets in new_secrets.items():
                  for s in secrets:
                      print(f"  {filepath}:{s['line_number']} - {s['type']}")
              sys.exit(1)
          else:
              print("✅ No new secrets detected.")
          EOF
